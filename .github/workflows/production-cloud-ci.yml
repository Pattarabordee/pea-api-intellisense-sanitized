name: Production Cloud CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  python-guardrails:
    name: Python guardrails and sanitized export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Python guardrail tests
        run: |
          export PYTHONPATH="$PWD"
          python tests/test_production_path.py
          python tests/test_ais_inbound.py
      - name: Build sanitized source bundle
        run: |
          export PYTHONPATH="$PWD"
          python -m ais_etr export-sanitized-codebase
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("runtime/sanitized_codebase_manifest.json").read_text(encoding="utf-8"))
          if manifest.get("status") != "PASS":
              raise SystemExit(f"sanitized export failed: {manifest.get('scan_failures')}")
          print(f"sanitized export PASS, included={manifest.get('included_count')}, redactions={manifest.get('redaction_count')}")
          PY

  go-api:
    name: Go API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: apps/api-go/go.mod
      - name: Test and vet Go API
        run: |
          go mod download
          go test ./...
          go vet ./...

  next-console:
    name: Next.js console build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-next/package-lock.json
      - name: Install, audit, and build
        run: |
          npm ci
          npm audit --audit-level=moderate
          npm run build
