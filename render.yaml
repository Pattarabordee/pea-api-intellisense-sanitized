services:
  - type: web
    name: pea-api-intellisense-api
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/api-go/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pea-api-intellisense-postgres
          property: connectionString
      - key: AIS_INBOUND_API_KEY
        sync: false
      - key: AIS_NOTIFICATION_MODE
        value: shadow
      - key: PRODUCTION_SEND_MODE
        value: blocked
      - key: CALLBACK_TRANSPORT
        value: dry_run
      - key: EMERGENCY_OFF
        value: "false"
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: ALLOWED_ORIGIN
        value: https://pea-api-intellisense-web.onrender.com

  - type: web
    name: pea-api-intellisense-web
    runtime: node
    plan: starter
    rootDir: apps/web-next
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: API_BASE_URL
        value: https://pea-api-intellisense-api.onrender.com
      - key: AIS_INBOUND_API_KEY
        sync: false
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://pea-api-intellisense-api.onrender.com

databases:
  - name: pea-api-intellisense-postgres
    plan: basic-256mb
