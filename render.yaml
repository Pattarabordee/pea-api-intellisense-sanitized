services:
  - type: web
    name: pea-api-intellisense-api
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/api-go/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pea-api-intellisense-postgres
          property: connectionString
      - key: AIS_INBOUND_API_KEY
        sync: false
      - key: AIS_NOTIFICATION_MODE
        value: shadow
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: ALLOWED_ORIGIN
        fromService:
          type: web
          name: pea-api-intellisense-web
          property: host

  - type: web
    name: pea-api-intellisense-web
    runtime: node
    plan: starter
    rootDir: apps/web-next
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: API_BASE_URL
        fromService:
          type: web
          name: pea-api-intellisense-api
          property: host
      - key: AIS_INBOUND_API_KEY
        sync: false
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: pea-api-intellisense-api
          property: host

databases:
  - name: pea-api-intellisense-postgres
    plan: starter
